<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Full Tilt Adventures</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
:root{
  --gold:#d4af37;
}

body{
  margin:0;
  font-family:'Poppins',sans-serif;
  background:#0a0a0a;
  color:#fff;
  overflow-x:hidden;
}

/* NAV */
nav{
  position:fixed;
  top:0;
  width:100%;
  display:flex;
  justify-content:space-between;
  padding:14px 25px;
  background:rgba(0,0,0,0.55);
  backdrop-filter:blur(12px);
  z-index:999;
}

nav a{
  color:#fff;
  margin-left:15px;
  text-decoration:none;
  font-size:14px;
}

.logo{
  font-weight:600;
}

/* HERO (FIXED MOBILE CROPPING) */
.hero{
  height:100vh;
  position:relative;
  overflow:hidden;
  background:black;
}

/* KEY FIX: prevents aggressive cropping on phones */
.hero video{
  position:absolute;
  top:50%;
  left:50%;
  width:100%;
  height:100%;
  object-fit:cover;
  transform:translate(-50%,-50%);
}

/* fallback image */
.hero::before{
  content:"";
  position:absolute;
  inset:0;
  background:url('Header.jpg') center/cover no-repeat;
  z-index:-2;
}

.hero::after{
  content:"";
  position:absolute;
  inset:0;
  background:rgba(0,0,0,0.55);
}

.hero-content{
  position:relative;
  z-index:2;
  text-align:center;
  top:50%;
  transform:translateY(-50%);
  padding:0 20px;
}

.hero h1{
  font-size:clamp(28px,6vw,60px);
  margin:0;
}

.btn{
  display:inline-block;
  margin-top:20px;
  background:var(--gold);
  color:#000;
  padding:12px 26px;
  border-radius:30px;
  text-decoration:none;
  font-weight:600;
}

/* SECTIONS */
section{
  padding:80px 20px;
  max-width:1100px;
  margin:auto;
}

/* PORTFOLIO */
.portfolio{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
  gap:20px;
}

.video-card{
  background:#111;
  border-radius:12px;
  overflow:hidden;
  cursor:pointer;
  transition:.3s;
}

.video-card:hover{
  transform:scale(1.03);
}

.video-card iframe{
  width:100%;
  height:200px;
  border:none;
}

.video-info{
  padding:12px;
}

.video-info h3{
  margin:0;
}

.video-info p{
  font-size:13px;
  opacity:0.7;
}

/* LIGHTBOX */
.lightbox{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.92);
  display:none;
  align-items:center;
  justify-content:center;
  z-index:1000;
}

.lightbox iframe{
  width:92%;
  height:80%;
  max-width:1000px;
}

/* MOBILE FIXES */
@media (max-width:768px){

  nav{
    flex-wrap:wrap;
    gap:10px;
  }

  .video-card iframe{
    height:180px;
  }

  .hero video{
    width:100%;
    height:100%;
    object-fit:cover;
  }
}
</style>
</head>

<body>

<!-- NAV -->
<nav>
  <div class="logo">Full Tilt Adventures</div>
  <div>
    <a href="#portfolio">Portfolio</a>
    <a href="#contact">Contact</a>
  </div>
</nav>

<!-- HERO -->
<section class="hero">
  <video autoplay muted loop playsinline>
    <source src="Hero.mp4" type="video/mp4">
  </video>

  <div class="hero-content">
    <h1>Full Tilt Adventures</h1>
    <p>Cinematic Outdoor & Event Videography</p>
    <a href="#portfolio" class="btn">View Work</a>
  </div>
</section>

<!-- PORTFOLIO -->
<section id="portfolio">

  <h2>Portfolio</h2>

  <div class="portfolio">

    <!-- ORIGINAL VIDEO -->
    <div class="video-card" onclick="openVideo('7Ckwz5fhfKE')">
      <iframe loading="lazy" src="https://www.youtube.com/embed/7Ckwz5fhfKE"></iframe>
      <div class="video-info">
        <h3>Adventure Film</h3>
        <p>Cinematic outdoor storytelling</p>
      </div>
    </div>

    <!-- NEW VIDEO 1 -->
    <div class="video-card" onclick="openVideo('K3NTW6vsrT0')">
      <iframe loading="lazy" src="https://www.youtube.com/embed/K3NTW6vsrT0"></iframe>
      <div class="video-info">
        <h3>Field Session</h3>
        <p>Outdoor cinematic capture</p>
      </div>
    </div>

    <!-- NEW VIDEO 2 -->
    <div class="video-card" onclick="openVideo('VmdjHFpwNAI')">
      <iframe loading="lazy" src="https://www.youtube.com/embed/VmdjHFpwNAI"></iframe>
      <div class="video-info">
        <h3>Wildlife / Action</h3>
        <p>High-intensity field production</p>
      </div>
    </div>

  </div>
</section>

<!-- LIGHTBOX -->
<div class="lightbox" id="lightbox" onclick="closeVideo()">
  <iframe id="lightboxFrame"></iframe>
</div>

<script>
function openVideo(id){
  document.getElementById("lightbox").style.display="flex";
  document.getElementById("lightboxFrame").src =
  "https://www.youtube.com/embed/" + id + "?autoplay=1";
}

function closeVideo(){
  document.getElementById("lightbox").style.display="none";
  document.getElementById("lightboxFrame").src="";
}
</script>

</body>
</html>
